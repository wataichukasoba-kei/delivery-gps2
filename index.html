<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delivery GPS</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<style>
html,body{
    margin:0;
    height:100%;
}

#map{
    height:100vh;
}

.controls{
    position:fixed;
    bottom:90px;
    left:50%;
    transform:translateX(-50%);
    z-index:1000;
    display:flex;
    gap:15px;
}

button{
    width:140px;
    height:55px;
    font-size:20px;
    font-weight:bold;
    border:none;
    border-radius:15px;
    color:white;
    box-shadow:0 3px 10px rgba(0,0,0,.3);
}

#startBtn{
    background:#28a745;
}

#stopBtn{
    background:#dc3545;
}

.status{
    position:fixed;
    top:15px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:10px 18px;
    border-radius:12px;
    font-weight:bold;
    z-index:1000;
    box-shadow:0 3px 10px rgba(0,0,0,.3);
}
</style>

</head>

<body>

<div class="status" id="status">
🔴 停止中
</div>

<div id="map"></div>

<div class="controls">
<button id="startBtn" onclick="startTracking()">🟢 開始</button>
<button id="stopBtn" onclick="stopTracking()">🔴 停止</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

const map = L.map("map").setView([35.767,139.847],13);

L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{
    attribution:"© OpenStreetMap"
}).addTo(map);

let currentMarker = null;
let watchId = null;
let tracking = false;
let path = [];
let gpsLog = [];

const polyline = L.polyline([],{
    color:"blue",
    weight:5
}).addTo(map);

navigator.geolocation.getCurrentPosition(showCurrentLocation);

function showCurrentLocation(position){

    const lat = position.coords.latitude;
    const lng = position.coords.longitude;

    map.setView([lat,lng],17);

    if(currentMarker){
        currentMarker.setLatLng([lat,lng]);
    }else{
        currentMarker = L.marker([lat,lng]).addTo(map);
    }

}

function startTracking(){

    if(tracking) return;

    tracking = true;

    document.getElementById("status").innerHTML = "🟢 GPS記録中";

    path = [];
    gpsLog = [];

    polyline.setLatLngs([]);

    watchId = navigator.geolocation.watchPosition(position=>{

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        if(currentMarker){
            currentMarker.setLatLng([lat,lng]);
        }else{
            currentMarker = L.marker([lat,lng]).addTo(map);
        }

        map.panTo([lat,lng]);

        path.push([lat,lng]);

        gpsLog.push({
            time:new Date().toISOString(),
            lat:lat,
            lng:lng,
            speed:position.coords.speed,
            accuracy:position.coords.accuracy
        });

        polyline.setLatLngs(path);

        document.getElementById("status").innerHTML =
        `🟢 GPS記録中 (${gpsLog.length}件)`;

    },
    ()=>{
        alert("GPS取得失敗");
    },
    {
        enableHighAccuracy:true,
        maximumAge:0
    });

}

function stopTracking(){

    if(!tracking) return;

    navigator.geolocation.clearWatch(watchId);

    tracking = false;

    document.getElementById("status").innerHTML="🔴 停止中";

    console.log(gpsLog);

    alert(`記録終了\n${gpsLog.length}件保存しました`);

}

</script>

</body>
</html>
